<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Supply - Order Confirmation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #FFD200; --secondary: #0B2149; --bg-light: #F8F9FA; --text-dark: #0B2149; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-light); color: var(--text-dark); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 2rem; }
        
        .success-card { background: white; width: 100%; max-width: 600px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; overflow: hidden; }
        .success-header { background: var(--secondary); color: white; padding: 3rem 2rem; position: relative; }
        .icon-circle { width: 80px; height: 80px; background: var(--primary); color: var(--secondary); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 2.5rem; margin: 0 auto 1.5rem; box-shadow: 0 0 0 10px rgba(255, 210, 0, 0.2); }
        .success-header h1 { font-size: 2rem; font-weight: 900; margin-bottom: 0.5rem; }
        .success-header p { color: #DDD; font-size: 1.1rem; }
        
        .order-details { padding: 3rem 2rem; text-align: left; }
        .order-meta { display: flex; justify-content: space-between; border-bottom: 1px solid #EEE; padding-bottom: 1.5rem; margin-bottom: 1.5rem; }
        .meta-box span { display: block; color: #888; font-size: 0.85rem; margin-bottom: 0.3rem; text-transform: uppercase; font-weight: 600; }
        .meta-box strong { font-size: 1.1rem; font-weight: 800; color: var(--secondary); }
        
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 0.8rem; color: #555; }
        .summary-row.total { font-weight: 900; font-size: 1.3rem; color: var(--secondary); border-top: 1px solid #EEE; padding-top: 1rem; margin-top: 0.5rem; }
        
        .btn-home { display: block; width: 100%; background: var(--primary); color: var(--secondary); padding: 1.2rem; border-radius: 8px; border: none; font-size: 1.1rem; font-weight: 900; cursor: pointer; text-decoration: none; text-align: center; transition: 0.3s; margin-top: 2rem; }
        .btn-home:hover { background: #E6BE00; }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="success-header">
            <div class="icon-circle"><i class="fa-solid fa-check"></i></div>
            <h1>Order Confirmed!</h1>
            <p>Thank you for your purchase.</p>
        </div>
        <div class="order-details">
            <div class="order-meta">
                <div class="meta-box">
                    <span>Order ID</span>
                    <strong>#ORD-2026-8921</strong>
                </div>
                <div class="meta-box" style="text-align: right;">
                    <span>Date</span>
                    <strong>June 02, 2026</strong>
                </div>
            </div>
            
            <h3 style="margin-bottom: 1rem; color: var(--secondary); font-weight: 800;">Order Summary</h3>
            <div class="summary-row">
                <span>Eco-Friendly A5 Notebook (x2)</span>
                <span style="font-weight: 600; color: var(--text-dark);">37,980 Ks</span>
            </div>
            <div class="summary-row">
                <span>Uni-ball Onyx Pens (x1)</span>
                <span style="font-weight: 600; color: var(--text-dark);">12,000 Ks</span>
            </div>
            <div class="summary-row" style="margin-top: 1rem;">
                <span>Subtotal</span>
                <span>49,980 Ks</span>
            </div>
            <div class="summary-row">
                <span>Shipping</span>
                <span>5,000 Ks</span>
            </div>
            <div class="summary-row total">
                <span>Total Paid</span>
                <span>54,980 Ks</span>
            </div>
            
            <a href="index.html" class="btn-home">Return to Homepage</a>
        </div>
    </div>
</body>
</html>
