<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Supply - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CSS reset & variables */
        :root { --primary: #FFD200; --secondary: #0B2149; --bg-light: #F8F9FA; --text-dark: #0B2149; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { display: flex; min-height: 100vh; background-color: var(--bg-light); color: var(--text-dark); }
        .auth-image { flex: 1; background: url('https://images.unsplash.com/photo-1456735190827-d1262f71b8a3?w=800') center/cover; position: relative; }
        .auth-overlay { position: absolute; inset: 0; background: rgba(11, 33, 73, 0.7); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; padding: 2rem; text-align: center; }
        .auth-form-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 2rem; background: white; }
        .auth-box { width: 100%; max-width: 450px; }
        .auth-box h1 { font-size: 2.5rem; font-weight: 900; margin-bottom: 0.5rem; color: var(--secondary); }
        .auth-box p { color: #666; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 1rem; border: 1px solid #CCC; border-radius: 8px; font-family: inherit; font-size: 1rem; outline: none; transition: 0.2s; }
        .form-group input:focus { border-color: var(--secondary); }
        .btn-auth { width: 100%; background: var(--primary); color: var(--secondary); padding: 1rem; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 900; cursor: pointer; transition: 0.3s; margin-top: 1rem; }
        .btn-auth:hover { background: #E6BE00; }
        .auth-links { margin-top: 1.5rem; text-align: center; font-size: 0.9rem; }
        .auth-links a { color: var(--secondary); font-weight: 800; text-decoration: none; }
        .logo-box { background-color: var(--primary); color: var(--secondary); width: 60px; height: 60px; display: inline-flex; justify-content: center; align-items: center; border-radius: 15px; font-size: 2rem; transform: rotate(-8deg); margin-bottom: 1rem; box-shadow: 0 4px 10px rgba(255, 210, 0, 0.4); }
        .logo-box i { transform: rotate(8deg); }
    </style>
</head>
<body>
    <div class="auth-image">
        <div class="auth-overlay">
            <img src="../logo.png" alt="Campus Supply Logo" style="width: 100px; height: 100px; object-fit: contain; background: white; border-radius: 16px; margin-bottom: 1.5rem; box-shadow: 0 10px 20px rgba(0,0,0,0.15);">
            <h2 style="font-weight: 900; font-size: 2.5rem; margin-bottom: 1rem;">CAMPUS SUPPLY</h2>
            <p style="font-size: 1.1rem; max-width: 400px; line-height: 1.6;">Your premium destination for school and office essentials. Login to track orders and save your wishlist.</p>
        </div>
    </div>
    <div class="auth-form-container">
        <div class="auth-box">
            <h1>Welcome Back!</h1>
            <p>Please enter your details to sign in.</p>
            <form onsubmit="event.preventDefault(); window.location.href='customerview.html';">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 1.5rem; font-size: 0.9rem;">
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;"><input type="checkbox"> Remember me</label>
                    <a href="#" style="color: var(--secondary); font-weight: 600; text-decoration: none;">Forgot Password?</a>
                </div>
                <button type="submit" class="btn-auth">Sign In</button>
            </form>
            <div class="auth-links">
                Don't have an account? <a href="customer_register.html">Sign Up</a>
            </div>
        </div>
    </div>
</body>
</html>
